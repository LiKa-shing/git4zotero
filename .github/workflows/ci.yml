name: CI

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "bootstrap.js"
      - "chrome/**"
      - "docs/**"
      - "locale/**"
      - "manifest.json"
      - "package.json"
      - "package-lock.json"
      - "prefs.js"
      - "README.md"
      - "scripts/**"
      - "tsconfig.json"
      - "CHANGELOG.md"
      - "CONTRIBUTING.md"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "bootstrap.js"
      - "chrome/**"
      - "docs/**"
      - "locale/**"
      - "manifest.json"
      - "package.json"
      - "package-lock.json"
      - "prefs.js"
      - "README.md"
      - "scripts/**"
      - "tsconfig.json"
      - "CHANGELOG.md"
      - "CONTRIBUTING.md"

permissions:
  contents: read

jobs:
  verify:
    name: Verify and package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.16.0"

      - name: Install dependencies
        run: npm ci

      - name: Static checks
        run: npm run check

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Package XPI
        run: npm run package

      - name: Inspect XPI
        run: npm run inspect:xpi

      - name: Upload XPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: git4zotero-xpi
          path: dist/git4zotero.xpi
          if-no-files-found: error
